model:
    model_name: SI_Arches
    lr: 5.0e-5
    SI_Arches:
        model:
            emb_dim: 128
            patch_size: [2, 2, 2]
            num_heads: [4, 8, 8, 4]
            window_size: [1, 5, 10]
            tensor_size: [15, 90, 180] # after patchify/encode
            depth_multiplier: 1
        scheduler:
            num_refinement_steps: 10
            num_train_steps: 21
            integrator: em

data:
    train_data_path: /glade/derecho/scratch/ayz/AMIP_train_new.h5
    val_data_path: /glade/derecho/scratch/ayz/AMIP_valid_new.h5
    norm_stats_path: /glade/derecho/scratch/ayz/norm_stats_dict_new.pkl
    climatology_path: /glade/derecho/scratch/ayz/climatology_1990_1996.pkl
        
    training_nsteps: 2
    val_nsteps: 41 # 10 days
    val_horizon: 1460 # 1 year
    use_climatology: False
    climatology_horizon: 7308 # 5year #1460 # 1 year
    climatology_start: 16072 # 1990-01-01

    batch_size: 1
    num_workers: 1 

training:
    seed: 42
    devices: 4
    accelerator: gpu
    strategy: ddp
    precision: 16-mixed
    check_val_every_n_epoch: 2
    log_every_n_steps: 10
    max_epochs: 50
    ema_decay: 0.99
    num_sanity_val_steps: 0
    log_dir: /glade/derecho/scratch/ayz/AMIP_logs/
    project: amip_forecast
    wandb_mode: online
    checkpoint: null
    accumulate_grad_batches: 16
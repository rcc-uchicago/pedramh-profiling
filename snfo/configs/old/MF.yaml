model:
    model_name: Pixel_iMF
    lr: 5.0e-5
    model: 
        input_size: [180, 360]
        patch_size: [6, 6]
        in_channels: 308
        out_channels: 151
        hidden_size: 1024
        depth: 16
        num_heads: 16
    params:
        in_channels: 151
        img_size: [180, 360]
        num_steps: 2
      
data:
    data_dir: '/project/pedramh/AMIP/h5'
    upper_air_variables: ["temperature",
                  "u_component_of_wind",
                  "v_component_of_wind",
                  "geopotential",
                  "specific_total_water"]
    surface_variables: ["skin_temperature",
                     "surface_pressure",
                     "2m_temperature",
                     "2m_specific_humidity", 
                     "10m_u_component_of_wind", 
                     "10m_v_component_of_wind"]
    diagnostic_variables: ["USWRFtoa_24h",
                        "ULWRFtoa_24h", 
                       "USWRFsfc_24h",
                       "ULWRFsfc_24h",
                       "DSWRFsfc_24h",
                       "DLWRFsfc_24h",
                       "LHTFLsfc_24h",
                       "SHTFLsfc_24h",
                       "PRATEsfc_24h", 
                       "hcc_24h",
                       "lcc_24h", 
                       "mcc_24h", 
                       "mn2t_24h", 
                       "mx2t_24h", 
                       "mxtpr_24h"]
    constant_boundary_variables: ["geopotential_at_surface", 
                                    "land_sea_mask"]
    varying_boundary_variables: ["DSWRFtoa", 
                                "global_mean_co2",
                                "sea_surface_temperature", # has nans
                                "sea_ice_cover"] # has nans
    mask_fill: {'sea_surface_temperature': 270.,
                'sea_ice_cover': 0.}
    train_year_start: 1979
    train_year_end: 2012
    val_year_start: 2012
    val_year_end: 2013
    mean_path: "/project/pedramh/AMIP/h5/normalize_mean.nc"
    std_path: "/project/pedramh/AMIP/h5/normalize_std.nc"
    forecast_lead_times: [1, 3, 5, 10]

    calendar: 'standard'
    data_timedelta_hours: 6
    timedelta_hours: 24
    has_year_zero: False
    levels: [5, 7, 10, 20, 30, 50, 70, 100, 125, 150, 175, 200, 250, 300, 400, 500, 600, 700, 800, 850, 875, 900, 925, 950, 975, 1000]
    horizontal_resolution: [180, 360]
    predict_delta: False
    epsilon_factor: 0
    val_num_inferences: 100 
    diagnostic_input: True # specific to SI models, we need a source distribution for diagnostics

    batch_size: 3
    num_data_workers: 8

training:
    seed: 42
    devices: 4
    num_nodes: 1
    accelerator: gpu
    strategy: ddp_find_unused_parameters_true
    precision: 32-true
    check_val_every_n_epoch: 1
    log_every_n_steps: 10
    max_epochs: 50
    ema_decay: 0.99
    num_sanity_val_steps: 1
    log_dir: /project/pedramh/shared/anthonyz/AMIP_logs/
    project: amip_forecast
    wandb_mode: online
    checkpoint: null
    accumulate_grad_batches: 8
    optimizer: adam
    description: Pixel_iMF

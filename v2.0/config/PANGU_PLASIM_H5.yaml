### base config ###
base_config: &BASE
  loss: 'weightedl1'
  lr: 0.0001
  weight_decay: 3e-6
  scheduler: 'OneCycleLR' #'ReduceLROnPlateau'
  num_data_workers: 16
  oc_pct_start: 0.1
  oc_div_factor: 1e5
  oc_final_div_factor: 0.00025
  
  log_to_screen: !!bool True
  log_to_wandb: !!bool True
  save_checkpoint: !!bool True

  optimizer_type: 'AdamW' #'Adam' #'FusedAdam'

  plot_animations: !!bool False

  nettype: 'pangu_plasim'
  group: 'plasim'

  exp_dir: 'results'

  enable_fp8: False
  fresh_start: True
  use_transformer_engine: False
  early_stopping: False


  entity: 'awikner-University of Chicago'
  project: 'Pangu-PLASIM'
  name: 'pangu'




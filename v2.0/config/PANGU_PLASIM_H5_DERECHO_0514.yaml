### base config ###
base_config: &BASE
  loss: l1 
  lr: 0.0001
  weight_decay: 3e-6
  scheduler: 'OneCycleLR'
  num_data_workers: 4
  oc_pct_start: 0.1
  oc_div_factor: 1e5
  oc_final_div_factor: 0.00025
  
  log_to_screen: !!bool True
  log_to_wandb: !!bool True
  save_checkpoint: !!bool True
  # Checkpoint settings
  checkpoint_save_interval: 10    # Save numbered checkpoint every N epochs
  max_checkpoints_to_keep: 5      # Maximum numbered checkpoints to retain

  optimizer_type: 'AdamW'

  plot_animations: !!bool False

  nettype: 'pangu_plasim'
  group: 'plasim'

  exp_dir: '/glade/derecho/scratch/plyu/results'

  enable_fp8: False
  fresh_start: False
  use_transformer_engine: False
  early_stopping: False

  entity: 'awikner-University of Chicago'
  project: 'Pangu-PLASIM'
  name: Pangu-PLASIM-0514 

PLASIM: &PLASIM

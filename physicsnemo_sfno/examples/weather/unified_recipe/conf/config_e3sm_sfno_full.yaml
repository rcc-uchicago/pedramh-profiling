# =============================================================================
# E3SM SFNO — FULL TRAINING variant of config_e3sm_sfno.yaml (which is the smoke).
# Differences: model/tiny_sfno -> model/sfno. Everything else (dataset shape, curated
# dataset, transform) is identical, and the run-specific values (store paths, variable
# counts, batch/iteration bounds) are passed on the CLI by
# physicsnemo_sfno/polaris/polaris_sfno_full.pbs.
#
# training/sfno.yaml already carries the real bounds: num_epochs 500, max_iterations .inf.
# The SMOKE overrides those down to 1 epoch / 10 iterations on the CLI; the full launcher
# simply does not override them.
# =============================================================================
experiment_name: "Unified-Training"
experiment_desc: "unified training recipe for global weather models"
run_desc: "unified training recipe for global weather models"

# Get defaults
defaults:

  # Filesystem
  - filesystem/local
  #- filesystem/object_storage

  # Dataset
  - dataset/tiny_6hr_subsample
  #- dataset/6hr_subsample # uncomment for full dataset

  # Curated Dataset
  - curated_dataset/tiny_2_var
  #- curated_dataset/healpix_19_var
  #- curated_dataset/34_var
  
  # Transform
  - transform/trim_lat720
  #- transform/healpix
  #- transform/downsample

  # Data Pipeline
  - datapipe/default

  # Model — the FULL SFNO, not tiny_sfno. This line is the whole point of this file:
  # the recipe's defaults use hydra's PATH form (`- model/tiny_sfno`), which registers no
  # overridable `model` GROUP, so `model=sfno` on the CLI dies with
  #   "Could not override 'model'. No match in the defaults list."
  - model/sfno
  #- model/afno
  #- model/graphcastnet
  #- model/tiny_sfno

  # Training
  - training/sfno
  #- training/graphcastnet
  #- training/sfno

  # Validation
  - validation/afno

### Group-recipe clone — v11 dataset, GB=32, dual-knob CONFOUND-RESOLVED
### noise + duration probe (σ=0.020 + max_epochs=75, both on top of the
### lr8e4_minlr1e5 schedule floor).
###
### Parented on lr8e4_minlr1e5_epochs75. This run combines two earlier
### probes into a single experiment to (a) resolve the σ vs. min_lr
### confound exposed by the 2026-05-21 noise sweep and (b) deliver the
### production payoff of σ=0.02 + extra epochs that the comparative
### analysis in 2026-05-22 suggested.
###
### The original σ=0.020 run (lr8e4_noise0p020) used scheduler_min_lr=1e-8
### while the lr8e4_minlr1e5 baseline used 1e-5 — a 1000× difference in
### the cosine tail. Mean-Excess-RMSE analysis showed σ=0.020 winning
### under every lead-weighting (NWP, flat, climate-emph), but the win
### could be attributed to either σ or the min_lr floor. This run pins
### scheduler_min_lr=1e-5 (matching the baseline) so the σ=0.020 vs
### σ=0.050 comparison is single-knob.
###
### Diff vs lr8e4_minlr1e5_epochs75 parent (one logical knob change):
###   - input_noise.sigma: 0.05 → 0.02
###
### Diff vs lr8e4_noise0p020 (confound source, single-knob in the
### other direction):
###   - scheduler_min_lr: 1.0E-8 → 1.0E-5  (matched to lr8e4_minlr1e5)
###   - max_epochs: 50 → 75                (matched to epochs75 parent)
###   - scheduler_T_max: 45 → 70           (= max_epochs - lr_warmup_steps)
###
### All other knobs identical to lr8e4_minlr1e5_epochs75:
###   lr=8e-4, weight_decay=3e-6, betas=(0.9, 0.999), lr_warmup_steps=5,
###   lr_start=1.0E-4, optimizer_max_grad_norm=32.0, EMA decay 0.999.
###   NO warmstart — single continuous schedule from scratch.
###
### Decision matrix (vs lr8e4_minlr1e5_epochs75 result at tas24h=0.6396):
###   - tas24h ≤ 0.60 (significant short-lead gain, matching the
###     σ=0.020@50ep advantage on the original sweep) → σ=0.02 is
###     the real winner; promote to operating point; min_lr confound
###     was not load-bearing.
###   - 0.60 < tas24h < 0.66 (partial gain) → both σ and min_lr
###     contributed; σ=0.02 still preferred; consider σ probes below.
###   - tas24h ≥ 0.66 (no gain or regression vs σ=0.05) → original
###     σ=0.020 win was the min_lr=1e-8 floor, not the noise; σ=0.05
###     stays the operating point; pivot to investigating min_lr=1e-8
###     on the 1e-5 family as an independent axis.
###
### Inspection: $EXP_DIR/.../0/out.log val_ema curve and the final NWP
### scorecard at all 6 leads × 5 channels (MER analysis from 2026-05-22).
### Compare against:
###   - lr8e4_minlr1e5 (σ=0.05 @ 50ep) — the schedule-matched baseline.
###   - lr8e4_minlr1e5_epochs75 (σ=0.05 @ 75ep) — the duration parent.
###   - lr8e4_noise0p020 (σ=0.02 @ 50ep, min_lr=1e-8) — the confound source.
###
### Risk: low. σ=0.02 is below the baseline σ=0.05; the upstream
### preprocessor's clip=32 has accommodated σ up to 0.07 without
### gradient instability (lr8e4_minlr1e5_noise0p070 ran cleanly).
### Compute: ~9h 24m wall (75 epochs × ~7m 25s/epoch on 4× H100),
### matching the lr8e4_minlr1e5_epochs75 parent. SLURM budget 15h
### (60% headroom).
###
### {{OUTPUT_ROOT}} / {{EXP_DIR}} are placeholders — substituted by
### submit_zgplev_group_clone_v11_gb32_lr8e4_minlr1e5_noise0p020_epochs75.slurm.

plasim_sim52_zgplev_group_clone_v11_gb32_lr8e4_minlr1e5_noise0p020_epochs75:

    # --- Dataset paths ---
    metadata_json_path: "{{OUTPUT_ROOT}}/metadata/data.json"
    train_data_path:   "{{OUTPUT_ROOT}}/train"
    valid_data_path:   "{{OUTPUT_ROOT}}/valid"
    inf_data_path:     "{{OUTPUT_ROOT}}/test"
    exp_dir:           "{{EXP_DIR}}"

    # --- Image / time ---
    img_shape_x: 64
    img_shape_y: 128
    dhours: 6
    dt: 1
    multifiles: !!bool True

    # --- Grids ---
    model_grid_type: "legendre-gauss"
    data_grid_type:  "legendre-gauss"
    sht_grid_type:   "legendre-gauss"

    # --- Channels (53 loss-target names; state 52 + diagnostic 1) ---
    channel_names: ["pl","tas","ta1","ta2","ta3","ta4","ta5","ta6","ta7","ta8","ta9","ta10","ua1","ua2","ua3","ua4","ua5","ua6","ua7","ua8","ua9","ua10","va1","va2","va3","va4","va5","va6","va7","va8","va9","va10","hus1","hus2","hus3","hus4","hus5","hus6","hus7","hus8","hus9","hus10","zg200","zg250","zg300","zg400","zg500","zg600","zg700","zg850","zg925","zg1000","pr_6h"]

    # --- PlaSim plumbing (identical to GB4 baseline) ---
    diagnostic_h5_path: "fields_diagnostic"
    n_state_channels: 52
    n_diagnostic_channels: 1
    forcing_h5_path: "forcing"
    n_forcing_channels: 6
    forcing_channel_names: ["lsm","sg","z0","sst","rsdt","sic"]
    forcing_global_means_path: "{{OUTPUT_ROOT}}/stats/forcing_global_means.npy"
    forcing_global_stds_path:  "{{OUTPUT_ROOT}}/stats/forcing_global_stds.npy"
    forcing_time_means_path:   "{{OUTPUT_ROOT}}/stats/forcing_time_means.npy"

    # --- Normalization (zscore on full-dataset stats; matches group) ---
    normalization: "zscore"
    global_means_path: "{{OUTPUT_ROOT}}/stats/global_means.npy"
    global_stds_path:  "{{OUTPUT_ROOT}}/stats/global_stds.npy"
    time_means_path:   "{{OUTPUT_ROOT}}/stats/time_means.npy"

    # --- SFNO architecture (makani-supported subset of group convention) ---
    # NOTE on capacity gap: makani SFNO at these hyperparams ≈ 56.5 M params;
    # group ckpt is ≈ 106.9 M. The group's `num_blocks: 16` field has no
    # makani analog (silently swallowed by sfnonet **kwargs). Architecture
    # parity beyond what's set here would require porting upstream's
    # `sfno_plasim` net; left out of this clone deliberately.
    nettype: "SFNO"
    spectral_transform: "sht"
    filter_type: "linear"
    operator_type: "dhconv"
    scale_factor: 1
    embed_dim: 256
    num_layers: 12
    encoder_layers: 1
    mlp_ratio: 2.0
    use_mlp: !!bool True
    activation_function: "gelu"
    pos_embed: "direct"                     # group `pos_embed: True` → makani 'direct' (learned)
    normalization_layer: "instance_norm"
    hard_thresholding_fraction: 1.0
    big_skip: !!bool True
    rank: 1.0
    separable: !!bool False
    complex_activation: "real"
    spectral_layers: 3

    # --- Aux features all OFF (asserted by PlasimTrainer._set_data_shapes) ---
    add_grid:      !!bool False
    add_zenith:    !!bool False
    add_orography: !!bool False
    add_landmask:  !!bool False
    add_soiltype:  !!bool False
    history_normalization_mode: "none"

    # --- Loss (group uses "raw_l2" → makani's "l2 squared=true" is
    #     observed-equivalent: both compute mean of squared per-pixel
    #     residuals; "raw" in upstream means "no per-channel sqrt", same as
    #     squared=true here). Channel weights constant matches group. ---
    losses:
    -   type: "l2"
        channel_weights: "constant"
        temp_diff_normalization: !!bool False
        parameters:
            squared: !!bool True

    # --- Training schedule (5410-locked except lr) ---
    # global_batch=32 → per-rank=8 at world_size=4 (matches 5410).
    # lr=8e-4: frozen at the LR-winner from the v11 GB=32 √2 ladder.
    # min_lr=1e-5 + max_epochs=75 inherited from lr8e4_minlr1e5_epochs75
    # parent. The varied knob in this run is input_noise.sigma.
    lr: 8.0E-4
    weight_decay: 3.0E-6
    max_epochs: 75                           # inherited from epochs75 parent
    batch_size: 32                           # GLOBAL batch (per-rank=8 at 4-GPU DDP) — 5410 match
    n_history: 0
    n_future: 0
    valid_autoreg_steps: 3                   # 24h rollout signal at validation; matches GB4 baseline
    prediction_type: "iterative"

    # Scheduler — makani's `CosineAnnealingLR` + `LinearLR` warmup auto-wrap
    # = group's `LinearWarmupCosineAnnealingLR`. Schedule shape inherited
    # from lr8e4_minlr1e5_epochs75: peak 8e-4, floor 1e-5, warmup 5 epochs,
    # T_max=70 (= max_epochs 75 - lr_warmup_steps 5).
    scheduler: "CosineAnnealingLR"
    scheduler_T_max: 70                      # inherited from epochs75 parent
    scheduler_min_lr: 1.0E-5                 # inherited from lr8e4_minlr1e5 — THE confound-resolution lever
    lr_warmup_steps: 5                       # epochs (NOT iterations) — driver wraps in SequentialLR
    lr_start: 1.0E-4                         # LinearLR start_factor (unchanged from control)

    optimizer_type: "AdamW"
    optimizer_beta1: 0.9                     # group default (yaml absent → torch default 0.9)
    optimizer_beta2: 0.999                   # group default (yaml absent → torch default 0.999); was 0.95 in GB4
    optimizer_max_grad_norm: 32.0            # carried from lr8e4 baseline (safety net for lr=8e-4 peak).

    num_data_workers: 4
    num_visualization_workers: 0
    crop_size_x: None
    crop_size_y: None

    ics_type: "specify_number"
    save_raw_forecasts: !!bool True
    save_channel:       !!bool False
    masked_acc:         !!bool False
    maskpath: None

    # --- Input perturbation (group `epsilon_factor: 0.05`) ---
    # Group adds Gaussian noise std=0.05 to NORMALIZED state inputs in the
    # data loader (utils/data_loader_multifiles.py:869-881). Makani's
    # equivalent: `input_noise` block with mode="perturb", type="white",
    # sigma=0.02, perturb_channels = the 52 state channel names (no
    # diagnostic, no boundary forcing — group also leaves boundary alone).
    # Makani's preprocessor.py:255-258 adds the noise out-of-place after
    # normalization, matching group's "post-transform" placement.
    input_noise:
        type: "white"
        mode: "perturb"
        sigma: 0.02                          # SWEEP KNOB: was 0.05 in lr8e4_minlr1e5_epochs75 parent
        alpha: 0.0
        perturb_channels: ["pl","tas","ta1","ta2","ta3","ta4","ta5","ta6","ta7","ta8","ta9","ta10","ua1","ua2","ua3","ua4","ua5","ua6","ua7","ua8","ua9","ua10","va1","va2","va3","va4","va5","va6","va7","va8","va9","va10","hus1","hus2","hus3","hus4","hus5","hus6","hus7","hus8","hus9","hus10","zg200","zg250","zg300","zg400","zg500","zg600","zg700","zg850","zg925","zg1000"]
        learnable: !!bool False

    # Belt-and-suspenders: legacy add_noise/perturb knobs explicitly off
    # (input_noise above is the active noise pathway).
    perturb:    !!bool False
    add_noise:  !!bool False
    noise_std:  0.0
    pretrained: !!bool False

    # Target field — makani ignores this (the trainer always predicts the
    # full normalized state, see deterministic_trainer.py:631-642 and
    # preprocessor.append_history). Set to "state" for documentation
    # honesty only; flipping it changes nothing in the training loop.
    target: "state"
    normalize_residual: !!bool False

    log_to_screen: !!bool True
    log_to_wandb:  !!bool False              # OFF for first launch; flip on after sane curve
    log_video: 0
    save_checkpoint: "legacy"
    verbose: !!bool True

    wireup_info: "mpi"
    wireup_store: "tcp"

    # --- EMA unchanged from GB4 baseline ---
    ema:
        enabled: !!bool True
        decay: 0.999
        warmup: !!bool True
        allow_config_change: !!bool False

    # --- Phase-1 efficiency knobs (no-op at defaults; carried through) ---
    prefetch_factor: 4
    persistent_workers: !!bool True
    ema_validation_period: 1

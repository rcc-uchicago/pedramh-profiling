### PlaSim → Makani SFNO training config — 64×128 Gauss-Legendre (v10).
###
### Produced from src/plasim_makani_packager/templates/plasim_64x128_zgplev.yaml
### by plasim_makani_packager.metadata. {{OUTPUT_ROOT}} and {{EXP_DIR}} are
### substituted at render time; no external YAML anchor merges, so this file
### can be loaded standalone via
### `YParams(path, "plasim_sim52_astro_64x128_zgplev")`.
###
### v10 contract (docs/plasim_zg_plev_migration_plan.md): zg sigma channels
### zg1..zg10 are replaced by ten pressure-level channels zg150..zg925
### (TOA→surface, integer hPa); zg500 is now a literal 500 hPa geopotential
### channel for blocking / Z500 skill. The trainer contract (52 in / 53 out)
### is unchanged.
###
### DO NOT use this YAML with stock Makani directly — `h5_path=fields_state`
### (52 channels) + 53 `channel_names` is deliberately non-stock. The patched
### `PlasimTrainer` path (src/sfno_training/) is the only supported consumer.

plasim_sim52_astro_64x128_zgplev:

    # --- Dataset paths ---
    metadata_json_path: "{{OUTPUT_ROOT}}/metadata/data.json"
    train_data_path:   "{{OUTPUT_ROOT}}/train"
    valid_data_path:   "{{OUTPUT_ROOT}}/valid"
    inf_data_path:     "{{OUTPUT_ROOT}}/test"
    exp_dir:           "{{EXP_DIR}}"

    # --- Image / time ---
    img_shape_x: 64
    img_shape_y: 128
    dhours: 6
    dt: 1
    multifiles: true

    # --- Grids ---
    model_grid_type: "legendre-gauss"
    data_grid_type:  "legendre-gauss"
    sht_grid_type:   "legendre-gauss"

    # --- Channel names (53 loss-target names; state 52 + diagnostic 1) ---
    channel_names: ["pl","tas","ta1","ta2","ta3","ta4","ta5","ta6","ta7","ta8","ta9","ta10","ua1","ua2","ua3","ua4","ua5","ua6","ua7","ua8","ua9","ua10","va1","va2","va3","va4","va5","va6","va7","va8","va9","va10","hus1","hus2","hus3","hus4","hus5","hus6","hus7","hus8","hus9","hus10","zg150","zg200","zg250","zg300","zg400","zg500","zg600","zg700","zg850","zg925","pr_6h"]

    # --- PlaSim-specific plumbing (consumed by PlasimForcingDataset / PlasimPreprocessor) ---
    diagnostic_h5_path: "fields_diagnostic"
    n_state_channels: 52
    n_diagnostic_channels: 1
    forcing_h5_path: "forcing"
    n_forcing_channels: 6
    forcing_channel_names: ["lsm","sg","z0","sst","rsdt","sic"]
    forcing_global_means_path: "{{OUTPUT_ROOT}}/stats/forcing_global_means.npy"
    forcing_global_stds_path:  "{{OUTPUT_ROOT}}/stats/forcing_global_stds.npy"
    forcing_time_means_path:   "{{OUTPUT_ROOT}}/stats/forcing_time_means.npy"

    # --- Normalization stats (53-wide; sliced by out_channels inside LossHandler) ---
    normalization: "zscore"
    global_means_path: "{{OUTPUT_ROOT}}/stats/global_means.npy"
    global_stds_path:  "{{OUTPUT_ROOT}}/stats/global_stds.npy"
    time_means_path:   "{{OUTPUT_ROOT}}/stats/time_means.npy"

    # --- Architecture (stock SFNO keys; would otherwise come from BASE_CONFIG) ---
    nettype: "SFNO"
    filter_type: "linear"
    scale_factor: 3
    embed_dim: 384
    num_layers: 8
    complex_activation: "real"
    normalization_layer: "instance_norm"
    hard_thresholding_fraction: 1.0
    use_mlp: !!bool True
    mlp_mode: "serial"
    mlp_ratio: 2
    separable: !!bool False
    operator_type: "dhconv"
    activation_function: "gelu"
    pos_embed: "none"

    # --- Extra input channels (all off — prescribed forcing handles this) ---
    add_grid:      !!bool False
    add_zenith:    !!bool False
    add_orography: !!bool False
    add_landmask:  !!bool False

    # --- Training (stock BASE_CONFIG defaults inlined) ---
    losses:
    -   type: "l2"
        channel_weights: "constant"
        temp_diff_normalization: !!bool False
        parameters:
            squared: !!bool True

    lr: 1.0E-3
    n_eval_samples: 512
    n_train_samples_per_epoch: 8192
    max_epochs: 100
    batch_size: 8
    weight_decay: 0.0
    n_history: 0
    n_future: 0
    valid_autoreg_steps: 3
    prediction_type: "iterative"

    scheduler: "ReduceLROnPlateau"
    scheduler_T_max: 100
    scheduler_factor: 0.5
    scheduler_patience: 10
    scheduler_step_size: 5
    scheduler_gamma: 0.5
    lr_warmup_steps: 0
    optimizer_type: "AdamW"
    optimizer_beta1: 0.9
    optimizer_beta2: 0.95
    optimizer_max_grad_norm: 32

    num_data_workers: 2
    num_visualization_workers: 2
    crop_size_x: None
    crop_size_y: None

    ics_type: "specify_number"
    save_raw_forecasts: !!bool True
    save_channel:       !!bool False
    masked_acc:         !!bool False
    maskpath: None
    perturb:    !!bool False
    add_noise:  !!bool False
    noise_std:  0.0
    pretrained: !!bool False

    # --- Logging ---
    log_to_screen: !!bool True
    log_to_wandb:  !!bool False
    log_video: 0
    save_checkpoint: "legacy"
    verbose: !!bool False

    wireup_info: "mpi"
    wireup_store: "tcp"

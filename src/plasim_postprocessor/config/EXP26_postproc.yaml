# EXP26_postproc.yaml
# Post-processing config for EXP26_AIRES (Pangu-Plasim + soil moisture variable mrso).
# Extends EXP25_postproc.yaml by adding mrso to land variables.

postprocessing:

  upper_air_variables: ["ta", "ua", "va", "hus"]
  surface_variables: ["pl", "tas"]
  land_variables: ["mrso"]
  ocean_variables: []

  zg_source: "burn7"
  pressure_levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]

  accumulate_precip: true
  precip_accumulation_hours: [6]

  outputs:
    plasim:
      enabled: true
    pangu:
      enabled: true
      grid_file: "/glade/work/alancelin/PanguWeather-ens/v2.0/results/PLASIM/0525/grid.txt"
      variables: ["ta", "ua", "va", "hus", "zg", "tas", "pl", "pr_6h", "mrso"]

  burn7_wrapper: "/glade/u/home/zhil/project/AI-RES/Blocking/AI-RES/RES/postprocessor/burn7_wrappers/derecho.sh"
  cdo_path: "cdo"
  ncap2_path: "ncap2"
  sg_filepath: ""
  ncl_script_path: ""

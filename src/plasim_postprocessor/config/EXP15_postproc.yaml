# EXP15_postproc.yaml
# Post-processing config for EXP15_PFS (PFS forecast method, France blocking target).
# Use with postprocessor_version: "3.0" in the experiment JSON.
#
# This config produces:
#   - plasim_out.step_K.particle_I.nc  (T42, sigma-level + Z500 at 500 hPa)
# No Pangu regridding (PFS does not use Pangu for inference).

postprocessing:

  # --- Variables for sigma-level burn7 extraction ---
  # burn7 accepts variable name strings as the 'code' field in namelists.
  upper_air_variables: ["ta", "ua", "va", "hus"]
  surface_variables: ["pl", "tas"]
  land_variables: []
  ocean_variables: []

  # --- Z500 computation ---
  # "burn7": direct VTYPE=P extraction (more accurate, eliminates -20 to -30 m bias)
  # "ncl":   legacy NCL hydro() interpolation (for migration-equivalence testing only)
  zg_source: "burn7"
  pressure_levels: [500]  # hPa; add more levels if needed for Pangu

  # --- Precipitation accumulation ---
  accumulate_precip: false
  precip_accumulation_hours: [6, 24]

  # --- Output targets ---
  outputs:
    plasim:
      enabled: true         # Always produced; T42 sigma-level netCDF
    pangu:
      enabled: false        # PFS does not need Pangu-grid input
      grid_file: ""
      variables: []

  # --- burn7 environment (cluster-specific) ---
  # The wrapper handles 'module load gcc netcdf' and LD_LIBRARY_PATH.
  # Adjust this path to match your PATH_CODE location.
  burn7_wrapper: "/glade/u/home/zhil/project/AI-RES/Blocking/AI-RES/RES/postprocessor/burn7_wrappers/derecho.sh"

  # --- Other tool paths ---
  # 'cdo' works if loaded via conda; use absolute path for HPC job environments.
  cdo_path: "cdo"
  ncap2_path: "ncap2"
  sg_filepath: ""          # Only needed when zg_source="ncl"
  ncl_script_path: ""      # Only needed when zg_source="ncl"

### Phase F production config — group SFNO sigma10, 50 epochs, multi-node h100 DDP.
###
### Plan: docs/2026-05-10_phaseF_group_production_plan.md (v5).
### Derived from the smoke YAML; key production knobs:
###   - max_epochs: 50, batch_size: 8, lr: 2e-6, num_inferences: 128
###   - log_to_wandb: false (disabled — no wandb auth on this system), fresh_start: false (resume-friendly)
###   - ensemble_inference_hours: 8760 SCALAR (NOT a list — see plan §B2)
###   - long_rollout_years: 1 (per-IC year-bounded save)
###   - NO prediction_duration_days (would break leap years — see plan §B3)
###   - save_basenames: ["dummy"] (defensive — see plan §B4)
###   - varying_boundary_variables includes z0 (v10 semantics; differs from group ref)
###
### Long_inference reads boundary at canonical years 11/12 only — see plan
### §"single_ic boundary remap". Years 121-128 are NOT in the data_dir read path.
###
### Placeholders rendered by sfno_training_group.tools.render_yaml:
###   DATA_DIR, EXP_DIR (scalar substitutions)
###   TRAIN_DATA_SET_ENTRIES (block-expanded into 100 entries for years 12-111)
###   VAL_END_EXCL_11 (scalar)

base_config: &BASE
  loss: l1
  lr: 1.0e-06
  weight_decay: 3e-6
  scheduler:
  num_data_workers: 4
  oc_pct_start: 0.1
  oc_div_factor: 1e5
  oc_final_div_factor: 0.00025
  log_to_screen: true
  log_to_wandb: false
  save_checkpoint: true
  optimizer_type: AdamW
  plot_animations: false
  group: plasim
  exp_dir: "{{EXP_DIR}}"
  enable_fp8: false
  fresh_start: false
  use_transformer_engine: false
  early_stopping: false
  entity: "feynmannliu-AI-RES"
  project: "SFNO-PLASIM-AIRES"
  name: "SFNO-PLASIM-SIGMA10-AIRES-FULL"

PLASIM: &PLASIM
  <<: *BASE
  data_dir: "{{DATA_DIR}}"
  boundary_data_dir: "{{DATA_DIR}}"
  upper_air_variables: ['ta', 'ua', 'va', 'hus', 'zg']
  surface_variables: ['pl', 'tas']
  diagnostic_variables: ['pr_6h']
  land_variables: []
  ocean_variables: []
  mask_output: false
  constant_boundary_variables: ['lsm', 'sg']
  varying_boundary_variables: ['z0', 'sst', 'rsdt', 'sic']
  train_year_to_year: false
  train_year_start: 12
  train_year_end: 112                # end-exclusive (matches group ref convention)
  val_year_start: 11
  val_year_end: 12
  leap_year: 12                      # cftime.is_leap_year(12, 'proleptic_gregorian', has_year_zero=True) = True
  no_leap_year: 11
  long_validation: false
  data_timedelta_hours: 6
  has_year_zero: true

  # 100 train years (12-111). The block-expanded list is rendered by
  # render_yaml.py from manifest's per-year `train_end_exclusive_dt`.
  train_data_sets:
    "{{DATA_DIR}}":
      {{TRAIN_DATA_SET_ENTRIES}}
  validation_data_sets:
    "{{DATA_DIR}}":
      - ['0011-01-01 00:00:00', '{{VAL_END_EXCL_11}}']

  # Stats files (under data_dir; recomputed_from_converted_h5).
  surface_mean: data_train_mean.nc
  surface_std: data_train_std.nc
  surface_ff_std: data_train_std.nc
  upper_air_mean: data_train_mean.nc
  upper_air_std: data_train_std.nc
  upper_air_ff_std: data_train_std.nc
  boundary_mean: data_train_mean.nc
  boundary_std: data_train_std.nc
  diagnostic_mean: data_train_mean.nc
  diagnostic_std: data_train_std.nc
  climatology_file: climatology.nc

  calendar: 'proleptic_gregorian'
  timedelta_hours: 6
  batch_size: 8
  max_epochs: 50

  # Model parameters: matches 5410 SFNO sigma10 reference.
  num_levels: 10
  use_sigma_levels: true
  levels: [20000, 25000, 30000, 40000, 50000, 60000, 70000, 85000, 92500, 100000]
  sigma_levels: [0.03830000013113022, 0.11910000443458557, 0.21085000783205032, 0.31685000658035278, 0.43680000305175781, 0.56680002808570862, 0.69935008883476257, 0.82335007190704346, 0.92409998178482056, 0.98329997062683105]
  horizontal_resolution: [64, 128]
  predict_delta: false
  epsilon_factor: 0.05
  perturbation_type: gaussian_noise

  # Diagnostic knobs ON; auto-disabled by use_sigma_levels=true (train.py:3771-3776).
  diagnostic_logs: true
  diagnostic_acc: true
  diagnostic_gif: true
  diagnostic_gif_var_dict: {"zg": [50000], "ua": [0.03830000013113022, 0.21085000783205032], "ta": [0.92409998178482056], "tas": []}
  diagnostic_acc_var_dict: {"zg": [50000], "ua": [0.03830000013113022, 0.21085000783205032], "ta": [0.92409998178482056], "tas": []}
  diagnostic_spectrum_var_dict: {"zg": [50000], "ua": [0.03830000013113022, 0.21085000783205032], "ta": [0.92409998178482056], "tas": []}
  diagnostic_bias_var_dict: {"zg": [50000], "ua": [0.03830000013113022, 0.21085000783205032], "ta": [0.92409998178482056], "tas": []}
  diagnostic_spectra: true
  forecast_lead_times: [1, 12, 20, 40, 60]

  lev: 'lev'
  num_inferences: 128

  # long_inference knobs (Phase F.M consumes these via `submit_long_inference_full.slurm`).
  # CRITICAL: ensemble_inference_hours MUST be scalar — loader at
  #   data_loader_multifiles.py:483 does `// timedelta_hours` and lines 597/609/831/834
  #   do `timedelta(hours=...)`. List would TypeError. (Plan v5 §B2.)
  # CRITICAL: NO prediction_duration_days — loader at data_loader_multifiles.py:818
  #   sets `end_date = start + 365 days` which produces 1460 frames; leap years
  #   (124, 128) need 1464 → save trigger never fires. Rely on long_rollout_years=1
  #   + cftime year arithmetic instead. (Plan v5 §B3.)
  ensemble_inference_hours: 8760
  save_forecasts: true
  long_rollout_years: 1
  save_basenames: ["dummy"]           # defensive: ensemble path at :829 reads
                                       # len(save_basenames); single_ic path doesn't,
                                       # but harmless. (Plan v5 §B4.)

  use_reentrant: false
  checkpointing: 2

  mask_fill:
    sst: 271.35
    sic: 0.0
    lsm: 0.0
    sg: 0.0
    z0: 0.0
    rsdt: 0.0

  lat: [87.8637988392326, 85.0965269883174, 82.3129129478863, 79.5256065726594, 76.7368996803683, 73.9475151539896, 71.1577520115873, 68.3677561083132, 65.5776070108278, 62.7873517989631, 59.9970201084913, 57.2066315276433, 54.4161995260862, 51.6257336749383, 48.8352409662506, 46.0447266311017, 43.2541946653509, 40.463648178115, 37.6730896290453, 34.8825209937735, 32.091943881744, 29.3013596217627, 26.510769325211, 23.7201739335347, 20.9295742544895, 18.1389709902393, 15.3483647594915, 12.5577561152307, 9.76714555919557, 6.97653355394864, 4.18592053318915, 1.3953069108195, -1.3953069108195, -4.18592053318915, -6.97653355394864, -9.76714555919557, -12.5577561152307, -15.3483647594915, -18.1389709902393, -20.9295742544895, -23.7201739335347, -26.510769325211, -29.3013596217627, -32.091943881744, -34.8825209937735, -37.6730896290453, -40.463648178115, -43.2541946653509, -46.0447266311017, -48.8352409662506, -51.6257336749383, -54.4161995260862, -57.2066315276433, -59.9970201084913, -62.7873517989631, -65.5776070108278, -68.3677561083132, -71.1577520115873, -73.9475151539896, -76.7368996803683, -79.5256065726594, -82.3129129478863, -85.0965269883174, -87.8637988392326]
  lon: [0, 2.8125, 5.625, 8.4375, 11.25, 14.0625, 16.875, 19.6875, 22.5, 25.3125, 28.125, 30.9375, 33.75, 36.5625, 39.375, 42.1875, 45, 47.8125, 50.625, 53.4375, 56.25, 59.0625, 61.875, 64.6875, 67.5, 70.3125, 73.125, 75.9375, 78.75, 81.5625, 84.375, 87.1875, 90, 92.8125, 95.625, 98.4375, 101.25, 104.0625, 106.875, 109.6875, 112.5, 115.3125, 118.125, 120.9375, 123.75, 126.5625, 129.375, 132.1875, 135, 137.8125, 140.625, 143.4375, 146.25, 149.0625, 151.875, 154.6875, 157.5, 160.3125, 163.125, 165.9375, 168.75, 171.5625, 174.375, 177.1875, 180, 182.8125, 185.625, 188.4375, 191.25, 194.0625, 196.875, 199.6875, 202.5, 205.3125, 208.125, 210.9375, 213.75, 216.5625, 219.375, 222.1875, 225, 227.8125, 230.625, 233.4375, 236.25, 239.0625, 241.875, 244.6875, 247.5, 250.3125, 253.125, 255.9375, 258.75, 261.5625, 264.375, 267.1875, 270, 272.8125, 275.625, 278.4375, 281.25, 284.0625, 286.875, 289.6875, 292.5, 295.3125, 298.125, 300.9375, 303.75, 306.5625, 309.375, 312.1875, 315, 317.8125, 320.625, 323.4375, 326.25, 329.0625, 331.875, 334.6875, 337.5, 340.3125, 343.125, 345.9375, 348.75, 351.5625, 354.375, 357.1875]

  checkpoint_save_interval: 1
  max_checkpoints_to_keep: 3

SFNO:
  <<: *PLASIM
  nettype: 'sfno_plasim'
  lr: 2e-06
  scheduler:
  num_data_workers: 4
  loss: 'raw_l2'
  spectral_transform: 'sht'
  filter_type: 'linear'
  operator_type: 'dhconv'
  scale_factor: 1
  embed_dim: 256
  num_layers: 12
  use_mlp: true
  mlp_ratio: 2.0
  activation_function: 'gelu'
  encoder_layers: 1
  pos_embed: true
  drop_rate: 0.0
  drop_path_rate: 0.0
  num_blocks: 16
  sparsity_threshold: 0.0
  normalization_layer: 'instance_norm'
  hard_thresholding_fraction: 1.0
  use_complex_kernels: true
  big_skip: true
  rank: 1.0
  factorization: None
  separable: false
  complex_network: true
  complex_activation: 'real'
  spectral_layers: 3
  checkpointing: 0
  sync_norm: true
  enable_amp: true

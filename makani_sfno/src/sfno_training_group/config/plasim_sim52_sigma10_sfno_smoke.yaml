### Phase 1 v10-shim smoke config — derived from
### /work2/09979/awikner/stampede3/PanguWeather/v2.0/config/SFNO_PLASIM_H5_DERECHO_5410_finetune_1000.yaml
### but rebased onto Stampede3 paths and a tiny date range. NOT a strict
### replication of group SFNO-5410 — channels/levels/calendar/stats/eval differ.
###
### Placeholders rendered by sfno_training_group.tools.render_yaml:
###   {{DATA_DIR}}, {{EXP_DIR}}
###   {{TRAIN_END_EXCL_12}}, {{TRAIN_END_EXCL_13}} (last_train_init + 6h, exclusive)
###   {{VAL_END_EXCL_11}}                          (last_val_init + 6h, exclusive)

base_config: &BASE
  loss: l1
  lr: 1.0e-06
  weight_decay: 3e-6
  scheduler:
  num_data_workers: 4
  oc_pct_start: 0.1
  oc_div_factor: 1e5
  oc_final_div_factor: 0.00025
  log_to_screen: true
  log_to_wandb: false                # smoke: avoid wandb creds
  save_checkpoint: true
  optimizer_type: AdamW
  plot_animations: false
  group: plasim
  exp_dir: "{{EXP_DIR}}"
  enable_fp8: false
  fresh_start: true                  # smoke: never resume
  use_transformer_engine: false
  early_stopping: false
  entity: "feynmannliu-AI-RES"
  project: "SFNO-PLASIM-AIRES"
  name: "SFNO-PLASIM-SIGMA10-AIRES-SMOKE"

PLASIM: &PLASIM
  <<: *BASE
  data_dir: "{{DATA_DIR}}"
  boundary_data_dir: "{{DATA_DIR}}"  # smoke: bundle boundary in same per-timestep h5
  upper_air_variables: ['ta', 'ua', 'va', 'hus', 'zg']
  surface_variables: ['pl', 'tas']
  diagnostic_variables: ['pr_6h']
  land_variables: []
  ocean_variables: []
  mask_output: false
  constant_boundary_variables: ['lsm', 'sg']                 # 2 vars
  varying_boundary_variables: ['z0', 'sst', 'rsdt', 'sic']   # 4 vars (z0 promoted from constant — preserves v10 time-varying semantics)
  train_year_to_year: false
  train_year_start: 12
  train_year_end: 14                 # not actually used because train_data_sets is set; fallback only
  val_year_start: 11
  val_year_end: 12
  leap_year: 12                      # cftime.is_leap_year(12, 'proleptic_gregorian', has_year_zero=True) = True
  no_leap_year: 11
  long_validation: false
  data_timedelta_hours: 6
  has_year_zero: true

  # End-exclusive ranges (rendered from manifest's *_end_exclusive_dt fields).
  train_data_sets:
    "{{DATA_DIR}}":
      - ['0012-01-01 00:00:00', '{{TRAIN_END_EXCL_12}}']
      - ['0013-01-01 00:00:00', '{{TRAIN_END_EXCL_13}}']
  validation_data_sets:
    "{{DATA_DIR}}":
      - ['0011-01-01 00:00:00', '{{VAL_END_EXCL_11}}']

  # Stats files (under data_dir; recomputed_from_converted_h5).
  surface_mean: data_train_mean.nc
  surface_std: data_train_std.nc
  surface_ff_std: data_train_std.nc
  upper_air_mean: data_train_mean.nc
  upper_air_std: data_train_std.nc
  upper_air_ff_std: data_train_std.nc
  boundary_mean: data_train_mean.nc
  boundary_std: data_train_std.nc
  diagnostic_mean: data_train_mean.nc
  diagnostic_std: data_train_std.nc
  climatology_file: climatology.nc

  calendar: 'proleptic_gregorian'
  timedelta_hours: 6
  batch_size: 4
  max_epochs: 1                      # smoke: 1 epoch (tiny train_data_sets)

  # Model parameters: matches 5410 SFNO sigma10 reference.
  num_levels: 10
  use_sigma_levels: true
  levels: [20000, 25000, 30000, 40000, 50000, 60000, 70000, 85000, 92500, 100000]
  sigma_levels: [0.03830000013113022, 0.11910000443458557, 0.21085000783205032, 0.31685000658035278, 0.43680000305175781, 0.56680002808570862, 0.69935008883476257, 0.82335007190704346, 0.92409998178482056, 0.98329997062683105]
  horizontal_resolution: [64, 128]
  predict_delta: false
  epsilon_factor: 0.05

  # Sigma-level diagnostics auto-disabled by train.py:3771-3776; explicit for clarity.
  diagnostic_logs: false
  diagnostic_acc: false
  diagnostic_gif: false
  diagnostic_spectra: false
  forecast_lead_times: [1, 4, 8]

  lev: 'lev'
  num_inferences: 2                  # smoke: 2 IC eval samples

  # Defensive long_inference knobs (Phase F may invoke long_inference; harmless here).
  ensemble_inference_hours: 360
  save_forecasts: true
  prediction_duration_days: 2
  long_rollout_years: 1

  use_reentrant: false
  checkpointing: 2

  mask_fill:
    sst: 271.35                      # match v10 sentinel
    sic: 0.0
    lsm: 0.0
    sg: 0.0
    z0: 0.0
    rsdt: 0.0


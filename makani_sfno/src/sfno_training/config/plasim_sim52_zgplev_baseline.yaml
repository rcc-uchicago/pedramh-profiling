### PlaSim → Makani SFNO baseline production config — 64×128 Gauss-Legendre.
###
### This file is a CONVENIENCE COPY of the YAML that
### plasim_makani_packager.metadata.render_yaml writes into
### {OUTPUT_ROOT}/config/plasim_sim52_astro_64x128.yaml.  The packager-rendered
### file has {{OUTPUT_ROOT}} / {{EXP_DIR}} substituted concretely; this
### copy keeps the placeholders so the slurm submit script can render it
### at job-start time via envsubst (or so a caller can hand-edit).
###
### Use this YAML with src/sfno_training/train_plasim.py only — stock
### Makani crashes on the asymmetric channel layout.

### v10.1 zg pressure-level subset (docs/2026-05-04_zg1000hpa_migration_plan.md):
### zg200..zg1000 in channel_names (drops zg150, adds zg1000 for ACE parity);
### literal zg500 at STATE_CHANNELS[46] enables Z500 / blocking skill.
###

plasim_sim52_zgplev_baseline:

    # --- Dataset paths (substitute {{OUTPUT_ROOT}} / {{EXP_DIR}} or use the
    # ---  packager-rendered version under {OUTPUT_ROOT}/config/ directly) ---
    metadata_json_path: "{{OUTPUT_ROOT}}/metadata/data.json"
    train_data_path:   "{{OUTPUT_ROOT}}/train"
    valid_data_path:   "{{OUTPUT_ROOT}}/valid"
    inf_data_path:     "{{OUTPUT_ROOT}}/test"
    exp_dir:           "{{EXP_DIR}}"

    # --- Image / time ---
    img_shape_x: 64
    img_shape_y: 128
    dhours: 6
    dt: 1
    multifiles: !!bool True

    # --- Grids ---
    model_grid_type: "legendre-gauss"
    data_grid_type:  "legendre-gauss"
    sht_grid_type:   "legendre-gauss"

    # --- Channel names (53 loss-target names; state 52 + diagnostic 1) ---
    channel_names: ["pl","tas","ta1","ta2","ta3","ta4","ta5","ta6","ta7","ta8","ta9","ta10","ua1","ua2","ua3","ua4","ua5","ua6","ua7","ua8","ua9","ua10","va1","va2","va3","va4","va5","va6","va7","va8","va9","va10","hus1","hus2","hus3","hus4","hus5","hus6","hus7","hus8","hus9","hus10","zg200","zg250","zg300","zg400","zg500","zg600","zg700","zg850","zg925","zg1000","pr_6h"]

    # --- PlaSim plumbing (consumed by PlasimForcingDataset / PlasimPreprocessor) ---
    diagnostic_h5_path: "fields_diagnostic"
    n_state_channels: 52
    n_diagnostic_channels: 1
    forcing_h5_path: "forcing"
    n_forcing_channels: 6
    forcing_channel_names: ["lsm","sg","z0","sst","rsdt","sic"]
    forcing_global_means_path: "{{OUTPUT_ROOT}}/stats/forcing_global_means.npy"
    forcing_global_stds_path:  "{{OUTPUT_ROOT}}/stats/forcing_global_stds.npy"
    forcing_time_means_path:   "{{OUTPUT_ROOT}}/stats/forcing_time_means.npy"

    # --- Normalization ---
    normalization: "zscore"
    global_means_path: "{{OUTPUT_ROOT}}/stats/global_means.npy"
    global_stds_path:  "{{OUTPUT_ROOT}}/stats/global_stds.npy"
    time_means_path:   "{{OUTPUT_ROOT}}/stats/time_means.npy"

    # --- Architecture (production SFNO) ---
    nettype: "SFNO"
    filter_type: "linear"
    scale_factor: 3
    embed_dim: 384
    num_layers: 8
    complex_activation: "real"
    normalization_layer: "instance_norm"
    hard_thresholding_fraction: 1.0
    use_mlp: !!bool True
    mlp_mode: "serial"
    mlp_ratio: 2
    separable: !!bool False
    operator_type: "dhconv"
    activation_function: "gelu"
    pos_embed: "none"

    # --- Aux features all OFF (asserted by PlasimTrainer._set_data_shapes) ---
    add_grid:      !!bool False
    add_zenith:    !!bool False
    add_orography: !!bool False
    add_landmask:  !!bool False
    add_soiltype:  !!bool False
    history_normalization_mode: "none"

    # --- Loss + training ---
    losses:
    -   type: "l2"
        channel_weights: "constant"
        temp_diff_normalization: !!bool False
        parameters:
            squared: !!bool True

    lr: 1.0E-3
    n_eval_samples: 512
    n_train_samples_per_epoch: 8192
    max_epochs: 100
    batch_size: 8
    weight_decay: 0.0
    n_history: 0
    n_future: 0
    valid_autoreg_steps: 3
    prediction_type: "iterative"

    scheduler: "ReduceLROnPlateau"
    scheduler_T_max: 100
    scheduler_factor: 0.5
    scheduler_patience: 10
    scheduler_step_size: 5
    scheduler_gamma: 0.5
    lr_warmup_steps: 0
    optimizer_type: "AdamW"
    optimizer_beta1: 0.9
    optimizer_beta2: 0.95
    optimizer_max_grad_norm: 32

    num_data_workers: 2
    num_visualization_workers: 2
    crop_size_x: None
    crop_size_y: None

    ics_type: "specify_number"
    save_raw_forecasts: !!bool True
    save_channel:       !!bool False
    masked_acc:         !!bool False
    maskpath: None
    perturb:    !!bool False
    add_noise:  !!bool False
    noise_std:  0.0
    pretrained: !!bool False

    # --- Preprocessor required-attrs (Preprocessor2D reads these) ---
    target: "tendency"
    normalize_residual: !!bool False

    # --- Logging ---
    log_to_screen: !!bool True
    log_to_wandb:  !!bool False
    log_video: 0
    save_checkpoint: "legacy"
    verbose: !!bool False

    wireup_info: "mpi"
    wireup_store: "tcp"

    # --- EMA (Exponential Moving Average) of model weights ---
    # Karras-style warmup: decay_t = min(decay, (1+t)/(10+t)).
    # See docs/2026-05-02_ema_implementation_plan.md for full spec.
    # Scoped to legacy save AND legacy load (PlasimTrainer hard-errors at
    # __init__ if save_checkpoint or load_checkpoint == "flexible").
    ema:
        enabled: !!bool True
        decay: 0.999
        warmup: !!bool True
        # Set to True only when intentionally changing decay/warmup
        # mid-run; otherwise mismatched ema_config on resume is rejected.
        allow_config_change: !!bool False

    # --- Phase-1 efficiency knobs (docs/2026-05-04_phase1_efficiency_implementation_plan.md) ---
    # All three are no-ops at the current default values, so adding them
    # is behaviour-preserving. prefetch_factor and persistent_workers are
    # only consulted when num_data_workers > 0; the workerless path
    # ignores both. ema_validation_period=1 = current behaviour (EMA
    # validation every epoch).
    prefetch_factor: 4
    persistent_workers: !!bool True
    ema_validation_period: 1

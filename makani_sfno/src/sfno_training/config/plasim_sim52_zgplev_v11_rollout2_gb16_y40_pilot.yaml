### v11 rollout2 GB16 40y screening pilot — 2026-05-14.
###
### SCREENING PILOT (not a canonical adoption run). Asks one question:
### does multistep_count=2 improve zg500@120h/240h/336h enough at the
### v11-throughout / GB16 / 40-yr scale to justify a full v11 100-yr
### rollout2 training run? See docs/2026-05-14_v11_rollout2_gb16_y40_pilot_plan.md.
###
### Branch chain:
###   group_clone_v11 (no-clip, σ=0.05 input noise, β₂=0.999, EMA 0.999)
###   → gbhpo40_gb16_lr2_0e-4 (same recipe at GB16 + lr=2e-4 linear scaling, 40-yr)
###   → THIS PILOT (single delta: n_future 0 → 1, --multistep_count 2)
###
### Single config delta vs plasim_sim52_zgplev_gbhpo40_gb16_lr2_0e-4.yaml:
###   n_future: 0 → 1
### Everything else (lr, batch_size, weight_decay, β₂, scheduler family,
### warmup, EMA, input noise σ, channel_weights, max_grad_norm,
### max_epochs) is held identical so the pilot isolates the multistep axis.
###
### Dataset (v11 throughout, per 2026-05-14 user decision):
###   train  — v11 40y symlink farm sim52_zgplev_40yr_y12-51_v11_20260514
###            (years 12-51 symlinked from sim52_zgplev_full_v11/train)
###   valid  — year 11 (symlinked from sim52_zgplev_full_v11/valid)
###   stats/metadata/config — symlinked from sim52_zgplev_full_v11 (100y stats)
###   eval test_holdout — sim52_zgplev_full_v11/test_holdout (96 ICs, years 121-128)
###   eval climatology — sim52_zgplev_full_v11/train (100y v11, same as Pre-Run 0/0b)
###
### {{OUTPUT_ROOT}} / {{EXP_DIR}} substituted by
### submit_zgplev_v11_rollout2_gb16_y40_pilot.slurm.

plasim_sim52_zgplev_v11_rollout2_gb16_y40_pilot:

    # --- Dataset paths ---
    metadata_json_path: "{{OUTPUT_ROOT}}/metadata/data.json"
    train_data_path:   "{{OUTPUT_ROOT}}/train"
    valid_data_path:   "{{OUTPUT_ROOT}}/valid"
    inf_data_path:     "{{OUTPUT_ROOT}}/test"
    exp_dir:           "{{EXP_DIR}}"

    # --- Image / time ---
    img_shape_x: 64
    img_shape_y: 128
    dhours: 6
    dt: 1
    multifiles: !!bool True

    # --- Grids ---
    model_grid_type: "legendre-gauss"
    data_grid_type:  "legendre-gauss"
    sht_grid_type:   "legendre-gauss"

    # --- Channels (53 loss-target names; state 52 + diagnostic 1) ---
    channel_names: ["pl","tas","ta1","ta2","ta3","ta4","ta5","ta6","ta7","ta8","ta9","ta10","ua1","ua2","ua3","ua4","ua5","ua6","ua7","ua8","ua9","ua10","va1","va2","va3","va4","va5","va6","va7","va8","va9","va10","hus1","hus2","hus3","hus4","hus5","hus6","hus7","hus8","hus9","hus10","zg200","zg250","zg300","zg400","zg500","zg600","zg700","zg850","zg925","zg1000","pr_6h"]

    # --- PlaSim plumbing ---
    diagnostic_h5_path: "fields_diagnostic"
    n_state_channels: 52
    n_diagnostic_channels: 1
    forcing_h5_path: "forcing"
    n_forcing_channels: 6
    forcing_channel_names: ["lsm","sg","z0","sst","rsdt","sic"]
    forcing_global_means_path: "{{OUTPUT_ROOT}}/stats/forcing_global_means.npy"
    forcing_global_stds_path:  "{{OUTPUT_ROOT}}/stats/forcing_global_stds.npy"
    forcing_time_means_path:   "{{OUTPUT_ROOT}}/stats/forcing_time_means.npy"

    # --- Normalization ---
    normalization: "zscore"
    global_means_path: "{{OUTPUT_ROOT}}/stats/global_means.npy"
    global_stds_path:  "{{OUTPUT_ROOT}}/stats/global_stds.npy"
    time_means_path:   "{{OUTPUT_ROOT}}/stats/time_means.npy"

    # --- SFNO architecture ---
    nettype: "SFNO"
    spectral_transform: "sht"
    filter_type: "linear"
    operator_type: "dhconv"
    scale_factor: 1
    embed_dim: 256
    num_layers: 12
    encoder_layers: 1
    mlp_ratio: 2.0
    use_mlp: !!bool True
    activation_function: "gelu"
    pos_embed: "direct"
    normalization_layer: "instance_norm"
    hard_thresholding_fraction: 1.0
    big_skip: !!bool True
    rank: 1.0
    separable: !!bool False
    complex_activation: "real"
    spectral_layers: 3

    # --- Aux features all OFF ---
    add_grid:      !!bool False
    add_zenith:    !!bool False
    add_orography: !!bool False
    add_landmask:  !!bool False
    add_soiltype:  !!bool False
    history_normalization_mode: "none"

    # --- Loss ---
    losses:
    -   type: "l2"
        channel_weights: "constant"
        temp_diff_normalization: !!bool False
        parameters:
            squared: !!bool True

    # --- Training schedule (GB=16, lr=2.0e-4 — identical to gbhpo40_gb16_lr2_0e-4) ---
    lr: 2.0E-4
    weight_decay: 3.0E-6
    max_epochs: 50
    batch_size: 16                           # GLOBAL batch (per-rank=4 at 4-GPU DDP)
    n_history: 0
    n_future: 1                              # PILOT DELTA: multistep_count=2 → n_future=1
    valid_autoreg_steps: 3
    prediction_type: "iterative"

    scheduler: "CosineAnnealingLR"
    scheduler_T_max: 45                      # max_epochs (50) - lr_warmup_steps (5)
    scheduler_min_lr: 1.0E-8
    lr_warmup_steps: 5
    lr_start: 1.0E-4                         # LinearLR start_factor

    optimizer_type: "AdamW"
    optimizer_beta1: 0.9
    optimizer_beta2: 0.999
    optimizer_max_grad_norm: 0.0             # disabled — matches v11 no-clip recipe + 5410

    num_data_workers: 4
    num_visualization_workers: 0
    crop_size_x: None
    crop_size_y: None

    ics_type: "specify_number"
    save_raw_forecasts: !!bool True
    save_channel:       !!bool False
    masked_acc:         !!bool False
    maskpath: None

    # --- Input perturbation (group recipe; σ=0.05 on 52 state channels) ---
    input_noise:
        type: "white"
        mode: "perturb"
        sigma: 0.05
        alpha: 0.0
        perturb_channels: ["pl","tas","ta1","ta2","ta3","ta4","ta5","ta6","ta7","ta8","ta9","ta10","ua1","ua2","ua3","ua4","ua5","ua6","ua7","ua8","ua9","ua10","va1","va2","va3","va4","va5","va6","va7","va8","va9","va10","hus1","hus2","hus3","hus4","hus5","hus6","hus7","hus8","hus9","hus10","zg200","zg250","zg300","zg400","zg500","zg600","zg700","zg850","zg925","zg1000"]
        learnable: !!bool False

    perturb:    !!bool False
    add_noise:  !!bool False
    noise_std:  0.0
    pretrained: !!bool False

    target: "state"
    normalize_residual: !!bool False

    log_to_screen: !!bool True
    log_to_wandb:  !!bool False
    log_video: 0
    save_checkpoint: "legacy"
    verbose: !!bool True

    wireup_info: "mpi"
    wireup_store: "tcp"

    # --- EMA ---
    ema:
        enabled: !!bool True
        decay: 0.999
        warmup: !!bool True
        allow_config_change: !!bool False

    # --- Phase-1 efficiency knobs ---
    prefetch_factor: 4
    persistent_workers: !!bool True
    ema_validation_period: 1

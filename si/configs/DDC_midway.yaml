model:
    model_name: x_DDC
    lr: 5.0e-5
    x_DDC:
        encoder:
            downsample_factor: 4
        decoder:
            in_channels: 302 # 86*2 
            out_channels: 151 # 13*5 + 6 + 15 
            model_channels: 384
            channel_mult: [1, 2, 4]
            num_res_blocks: 3
            attn_levels: []
            num_heads: 8
            t_emb_dim: 256
        scheduler:
            num_steps: 10
            sigma_coef: 1.0
            train_sampler: power
            l_max: 180
            spectral_weight: 0.0
            model_last: True 
            noise : spherical
            tau: 1.3
            noise_scale_path: /home/anthonyz/amip/sigma_c_highres_26.pt

data:
    data_dir: '/project/pedramh/AMIP/h5'
    upper_air_variables: ["temperature",
                  "u_component_of_wind",
                  "v_component_of_wind",
                  "geopotential",
                  "specific_total_water"]
    surface_variables: ["skin_temperature",
                     "surface_pressure",
                     "2m_temperature",
                     "2m_specific_humidity", 
                     "10m_u_component_of_wind", 
                     "10m_v_component_of_wind"]
    diagnostic_variables: ["USWRFtoa_24h",
                        "ULWRFtoa_24h", 
                       "USWRFsfc_24h",
                       "ULWRFsfc_24h",
                       "DSWRFsfc_24h",
                       "DLWRFsfc_24h",
                       "LHTFLsfc_24h",
                       "SHTFLsfc_24h",
                       "PRATEsfc_24h", 
                       "hcc_24h",
                       "lcc_24h", 
                       "mcc_24h", 
                       "mn2t_24h", 
                       "mx2t_24h", 
                       "mxtpr_24h"]
    constant_boundary_variables: []
    varying_boundary_variables: [] 
    mask_fill: {'sea_surface_temperature': 270.,
                'sea_ice_cover': 0.}
    train_year_start: 1979
    train_year_end: 2012
    val_year_start: 2012
    val_year_end: 2013
    mean_path: "/home/anthonyz/amip/normalize_mean.nc"
    std_path: "/home/anthonyz/amip/normalize_std.nc"
    forecast_lead_times: [1] 
    autoencoder: True

    calendar: 'standard'
    data_timedelta_hours: 6
    timedelta_hours: 24
    has_year_zero: False
    levels: [5, 7, 10, 20, 30, 50, 70, 100, 125, 150, 175, 200, 250, 300, 400, 500, 600, 700, 800, 850, 875, 900, 925, 950, 975, 1000] 
    horizontal_resolution: [180, 360]
    predict_delta: False
    epsilon_factor: 0
    val_num_inferences: 50 # use entire val set
    diagnostic_input: True # specific to AE model, we need diagnostic at time t, since we are training a downscaler

    batch_size: 4
    num_data_workers: 4

training:
    seed: 42
    devices: 4
    accelerator: gpu
    strategy: ddp
    precision: 32-true
    check_val_every_n_epoch: 1
    log_every_n_steps: 10
    max_epochs: 50
    ema_decay: 0.99
    num_sanity_val_steps: 0
    log_dir: /project/pedramh/shared/anthonyz/AMIP_logs/
    project: amip_forecast
    wandb_mode: online
    checkpoint: /project/pedramh/shared/anthonyz/AMIP_logs/x_DDC_x_DDC_42_2026-04-16T17-08-57/last.ckpt
    description: x_DDC
    accumulate_grad_batches: 1
    optimizer: muon

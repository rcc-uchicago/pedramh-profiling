model:
    model_name: SI_Latent_DiT
    lr: 5.0e-5
    SI_Latent_DiT:
        model:
            in_channels: 308 # 2*176 + 2 + 3
            out_channels: 151 # 5 + 15 + 26*6 = 145
            dim: 1536
            num_heads: 8
            num_blocks: 20
            patch_size: 2
            scalar_dim: 1
            nlat: 45
            nlon: 90
            unpatch: subpixel
        scheduler:
            num_refinement_steps: 5
            num_train_steps: 21
            integrator: em
            sigma_coef: 0.5
        encoder:
            downsample_factor: 4
        decoder:
            out_channels: 151  # 6 + 26*5 + 15 = 151
            hidden_channels: 512
            z_channels: 151
            num_out_blocks: 2
            num_res_blocks: 3
            use_history: True 
            patch_size: 4
        decoder_checkpoint: /glade/derecho/scratch/ayz/AMIP_logs/Decoder_CNN_History/last.ckpt

data:
    data_dir: '/glade/derecho/scratch/awikner/ERA5/h5'
    upper_air_variables: ["temperature",
                  "u_component_of_wind",
                  "v_component_of_wind",
                  "geopotential",
                  "specific_total_water"]
    surface_variables: ["skin_temperature",
                     "surface_pressure",
                     "2m_temperature",
                     "2m_specific_humidity", 
                     "10m_u_component_of_wind", 
                     "10m_v_component_of_wind"]
    diagnostic_variables: ["USWRFtoa_24h",
                        "ULWRFtoa_24h", 
                       "USWRFsfc_24h",
                       "ULWRFsfc_24h",
                       "DSWRFsfc_24h",
                       "DLWRFsfc_24h",
                       "LHTFLsfc_24h",
                       "SHTFLsfc_24h",
                       "PRATEsfc_24h", 
                       "hcc_24h",
                       "lcc_24h", 
                       "mcc_24h", 
                       "mn2t_24h", 
                       "mx2t_24h", 
                       "mxtpr_24h"]
    constant_boundary_variables: ["geopotential_at_surface", 
                                    "land_sea_mask"]
    varying_boundary_variables: ["DSWRFtoa", 
                                "global_mean_co2",
                                "sea_surface_temperature", # has nans
                                "sea_ice_cover"] # has nans
    mask_fill: {'sea_surface_temperature': 270.,
                'sea_ice_cover': 0.}
    train_year_start: 1979
    train_year_end: 2012
    val_year_start: 2012
    val_year_end: 2013
    mean_path: "/glade/derecho/scratch/ayz/ERA5/h5/normalize_mean.nc"
    std_path: "/glade/derecho/scratch/ayz/ERA5/h5/normalize_std.nc"
    forecast_lead_times: [1, 3, 5, 10]

    calendar: 'standard'
    data_timedelta_hours: 6
    timedelta_hours: 24
    has_year_zero: False
    levels: [5, 7, 10, 20, 30, 50, 70, 100, 125, 150, 175, 200, 250, 300, 400, 500, 600, 700, 800, 850, 875, 900, 925, 950, 975, 1000]
    horizontal_resolution: [180, 360]
    predict_delta: False
    epsilon_factor: 0
    val_num_inferences: 100 # only use 100 snapshots for validation
    diagnostic_input: True # specific to SI models, we need a source distribution for diagnostics

    batch_size: 2
    num_data_workers: 8 

training:
    seed: 42
    devices: 4
    num_nodes: 1
    accelerator: gpu
    strategy: ddp
    precision: 32-true
    check_val_every_n_epoch: 1
    log_every_n_steps: 10
    max_epochs: 50
    ema_decay: 0.99
    num_sanity_val_steps: 1
    log_dir: /glade/derecho/scratch/ayz/AMIP_logs/
    project: amip_forecast
    wandb_mode: online
    checkpoint: /glade/derecho/scratch/ayz/AMIP_logs/SI_Latent_DiT__42_2026-03-31T08-49-33/model_epoch=43.ckpt
    accumulate_grad_batches: 1
    optimizer: adam
    description: history
    save_every: True

SFNO: &SFNO
  <<: *PLASIM
  nettype: 'sfno_plasim'
  scheduler: 'LinearWarmupCosineAnnealingLR'
  lr: 1e-4
  num_warmup_epochs: 5
  warmup_start_lr: 1e-8
  eta_min: 1e-8
  loss: "raw_l2"

  spectral_transform: 'sht'
  filter_type: 'linear'
  operator_type: 'dhconv'
  scale_factor: 1
  embed_dim: 256
  num_layers: 12
  use_mlp: True
  mlp_ratio: 2.0
  activation_function: "gelu"
  encoder_layers: 1
  pos_embed: True
  drop_rate: 0.0
  drop_path_rate: 0.0
  num_blocks: 16
  sparsity_threshold: 0.0
  normalization_layer: 'instance_norm'
  hard_thresholding_fraction: 1.0
  use_complex_kernels: True
  big_skip: True
  rank: 1.0
  factorization: None
  separable: False
  complex_network: True
  complex_activation: 'real'
  spectral_layers: 3
  checkpointing: 0
  sync_norm: True

modified_1: &MODIFIED

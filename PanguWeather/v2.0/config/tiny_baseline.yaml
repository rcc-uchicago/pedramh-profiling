# ============================================================================
# tiny_baseline_diff — EVERY key that differs from E3SM_SFNO_H5_POLARIS.yaml.
# Not loaded by train.py (it is a top-level key nothing reads); it exists so the
# next person can see the whole delta without diffing 250 lines of lat/lon.
#
#   MODEL SIZE (the point of the config)
#     embed_dim        512 -> 64
#     num_layers        12 -> 2
#     num_blocks        16 -> 4
#     spectral_layers    3 -> 1
#
#   HARNESS (DESIGN §4.1 asks for exactly these)
#     num_data_workers   1 -> 0     seeded/worker nondeterminism removed
#     use_ema         True -> False EMA is not part of the forward under test
#     log_to_wandb   False -> False (already off)
#     save_checkpoint      -> False
#     save_forecasts  True -> False
#     max_epochs       100 -> 1
#     diagnostic_{gif,spectra,acc} -> False
#     exp_dir -> {{MEMBER_ROOT}}/runs/pangu_tiny_baseline
#     section name    SFNO -> TINY  (so it cannot collide with the real run's exp_dir)
#     the unused `modified_1` block is deleted (it carried batch_size 16 — a live trap)
#
#   DELIBERATELY *NOT* CHANGED — and why
#     checkpointing: 3   kept. It is a LEVEL (sfnonet.py:692/704 test >=3 and >=1), not a
#                        per-layer segment count, so it is valid at 2 layers — and keeping
#                        it means an optimization validated here exercised the same
#                        activation-checkpointing path the real config uses.
#     batch_size: 1      already 1 in the real config.
#     the grids / levels / variable lists / stats paths / mask_fill: these are DATA facts.
#                        Shrinking them would mean this config no longer describes the model
#                        whose baseline we are capturing — and the E3SM archive is what it is.
#     nettype/loss       sfno_plasim + raw_l2: the path that actually runs on Polaris.
#
#   NOT EXERCISED BY THIS CONFIG — read before trusting a green here
#     The VAE. nettype sfno_plasim is DETERMINISTIC and has no VAE at all (DESIGN §2c), so
#     the utils/vae_noise.py hook is inert on this path. A pangu_plasim tiny baseline is
#     still needed to gate anything touching the VAE/CRPS path — it is blocked on PLASIM h5,
#     which is not staged on Polaris.
# ============================================================================

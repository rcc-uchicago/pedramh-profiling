### tiny_baseline — the DESIGN §4.0 small config (see the header block below) ###
# GENERATED from E3SM_SFNO_H5_POLARIS.yaml by hand-editing ONLY the keys listed in
# `tiny_baseline_diff` at the bottom of this file. Everything else — the lat/lon grids, the
# sigma levels, the variable lists, the stats paths — is identical to the real config,
# because those are DATA-shape facts and shrinking them would mean this config no longer
# exercises the model the baseline is about.
#
# WHY THIS EXISTS (DESIGN §4.0): no small config existed. `test.yaml` is the FULL ~79M-param
# model despite its name (it OOMed a 93 GiB H100 at its defaults), so there was nothing cheap
# to capture an equivalence baseline on. This is a genuinely small MODEL on the real data.
#
# Section is TINY -> run with `--config=TINY`; train.py writes to <exp_dir>/TINY/<run_num>.
### base config ###

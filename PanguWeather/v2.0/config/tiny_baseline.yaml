  loss: 'l1'
  loglr: -13
  weight_decay: 3e-6
  scheduler: 'LinearWarmupCosineAnnealingLR' 
  num_data_workers: 0   # §4.0: no worker nondeterminism
  num_warmup_epochs: 5
  batch_size: 1   # §4.0
  max_epochs: 1   # §4.0: the harness bounds the step count
  warmup_start_lr: 1e-6
  eta_min: 1e-5
  use_ema: False  # §4.0: EMA is not part of the forward under test
  ema_decay: 0.999
  
  no_leap_year: 2020 #yearly repeating conditions so set to any year in training data
  leap_year: 2020 #yearly repeating conditions so set to any year in training data

